spring.application.name=taxwisebe

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=${SERVER_PORT:8080}

# ---------------------------------------------------------------------------
# Database (MySQL) - override via environment variables in production
# ---------------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/taxcal
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---------------------------------------------------------------------------
# JWT
# CHANGE app.jwt.secret in production (min 256-bit / 32-byte, base64 recommended)
# ---------------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:Ki6J06Fy66oyl5GsDbKh9MoAIy27MRHfqZNDXAtQAjCSCdZSZqZvRuN8xUsQxece}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---------------------------------------------------------------------------
# CORS - comma separated list of allowed frontend origins
# ---------------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---------------------------------------------------------------------------
# Actuator
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
